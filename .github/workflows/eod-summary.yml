name: Daily Summary

on:
  schedule:
    # 4:00 AM GMT+8 = 8:00 PM UTC (previous day), Tue-Sat
    - cron: '0 20 * * 0-4'
  workflow_dispatch:

jobs:
  eod:
    runs-on: ubuntu-latest
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Alpaca data
        run: |
          # Account
          curl -s -H "APCA-API-KEY-ID: $ALPACA_API_KEY" \
               -H "APCA-API-SECRET-KEY: $ALPACA_SECRET_KEY" \
               https://paper-api.alpaca.markets/v2/account > /tmp/account.json

          # Positions
          curl -s -H "APCA-API-KEY-ID: $ALPACA_API_KEY" \
               -H "APCA-API-SECRET-KEY: $ALPACA_SECRET_KEY" \
               https://paper-api.alpaca.markets/v2/positions > /tmp/positions.json

          # Orders (open)
          curl -s -H "APCA-API-KEY-ID: $ALPACA_API_KEY" \
               -H "APCA-API-SECRET-KEY: $ALPACA_SECRET_KEY" \
               "https://paper-api.alpaca.markets/v2/orders?status=open" > /tmp/orders.json

          echo "=== Account ==="
          python3 -c "import json; d=json.load(open('/tmp/account.json')); print(f'Equity: {d[\"equity\"]}, Cash: {d[\"cash\"]}, Status: {d[\"status\"]}')"
          echo "=== Positions ==="
          cat /tmp/positions.json | python3 -c "import sys,json; [print(f'{p[\"symbol\"]}: {p[\"qty\"]}sh @ {p[\"avg_entry_price\"]}, current {p[\"current_price\"]}, P&L {p[\"unrealized_pl\"]}') for p in json.load(sys.stdin)]"

      - name: Build context and call Groq
        run: |
          DATE=$(date -u +%Y-%m-%d)
          DAY_OF_WEEK=$(date -u +%A)

          ACCOUNT=$(cat /tmp/account.json)
          POSITIONS=$(cat /tmp/positions.json)
          ORDERS=$(cat /tmp/orders.json)
          TRADE_LOG=$(tail -80 memory/TRADE-LOG.md)
          STRATEGY=$(cat memory/TRADING-STRATEGY.md)

          # Build the prompt
          cat > /tmp/prompt.json << 'PYEOF'
import json, os

date = os.popen("date -u +%Y-%m-%d").read().strip()
day_of_week = os.popen("date -u +%A").read().strip()

account = json.load(open("/tmp/account.json"))
positions = json.load(open("/tmp/positions.json"))
orders = json.load(open("/tmp/orders.json"))

with open("memory/TRADE-LOG.md") as f:
    trade_log = f.read()

with open("memory/TRADING-STRATEGY.md") as f:
    strategy = f.read()

# Count day number from phase start (Apr 21, 2026)
from datetime import datetime
phase_start = datetime(2026, 4, 21)
today = datetime.strptime(date, "%Y-%m-%d")
day_num = (today - phase_start).days + 1

system_msg = """You are an autonomous AI trading bot managing a paper ~$100,000 Alpaca account.
You produce EOD (end-of-day) summaries. Be ultra-concise: short bullets, no fluff.
Output EXACTLY two sections separated by ===TELEGRAM===:

SECTION 1: The TRADE-LOG entry to append (markdown, matching the format below exactly)
SECTION 2: A Telegram message (plain text, <=15 lines)

TRADE-LOG format:
### MMM DD — EOD Snapshot (Day N, Weekday)
**Portfolio:** $X | **Cash:** $X (X%) | **Day P&L:** ±$X (±X%) | **Phase P&L:** ±$X (±X%)

| Ticker | Shares | Entry | Close | Day Chg | Unrealized P&L | Stop |
|--------|--------|-------|-------|---------|----------------|------|
| ... |

**Notes:** one-paragraph summary of the day.

---

Telegram format:
EOD MMM DD
Portfolio: $X (±X% day, ±X% phase)
Cash: $X
Trades today: <list or none>
Open positions:
  SYM ±X.X% (stop $X)
Tomorrow: <one-line plan>"""

user_msg = f"""Date: {date} ({day_of_week}), Day {day_num} of trading phase.
Starting equity (phase): $100,000

=== ACCOUNT DATA ===
{json.dumps(account, indent=2)}

=== POSITIONS ===
{json.dumps(positions, indent=2)}

=== OPEN ORDERS ===
{json.dumps(orders, indent=2)}

=== RECENT TRADE LOG ===
{trade_log[-3000:]}

=== STRATEGY RULES ===
{strategy}

Produce the EOD summary now. Remember:
- Day P&L = today equity minus last EOD equity (find it in the trade log)
- Phase P&L = today equity minus $100,000
- For stops: check open orders for trailing_stop orders
- Include ALL open positions in the table
- Keep Telegram message <=15 lines"""

payload = {
    "model": "llama-3.3-70b-versatile",
    "messages": [
        {"role": "system", "content": system_msg},
        {"role": "user", "content": user_msg}
    ],
    "max_tokens": 1500,
    "temperature": 0.3
}

with open("/tmp/prompt.json", "w") as f:
    json.dump(payload, f)
PYEOF
          python3 /tmp/prompt.json

          # Call Groq
          HTTP_CODE=$(curl -s -o /tmp/groq_response.json -w "%{http_code}" \
            -X POST "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/prompt.json)

          echo "Groq HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Groq API failed"
            cat /tmp/groq_response.json
            exit 1
          fi

          # Extract response
          python3 -c "
import json
resp = json.load(open('/tmp/groq_response.json'))
content = resp['choices'][0]['message']['content']
print(content)

# Split into trade-log and telegram parts
parts = content.split('===TELEGRAM===')
trade_log_entry = parts[0].strip()
telegram_msg = parts[1].strip() if len(parts) > 1 else 'EOD summary generated - check git for details'

with open('/tmp/trade_log_entry.md', 'w') as f:
    f.write(trade_log_entry)

with open('/tmp/telegram_msg.txt', 'w') as f:
    f.write(telegram_msg)
"

          echo "=== Generated Trade Log Entry ==="
          cat /tmp/trade_log_entry.md
          echo ""
          echo "=== Telegram Message ==="
          cat /tmp/telegram_msg.txt

      - name: Update TRADE-LOG
        run: |
          echo "" >> memory/TRADE-LOG.md
          cat /tmp/trade_log_entry.md >> memory/TRADE-LOG.md
          echo "" >> memory/TRADE-LOG.md

      - name: Send Telegram
        run: |
          MSG=$(cat /tmp/telegram_msg.txt)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c "import json; print(json.dumps({'chat_id': '$TELEGRAM_CHAT_ID', 'text': open('/tmp/telegram_msg.txt').read()}))")")
          echo "Telegram HTTP status: $HTTP_CODE"

      - name: Commit and push
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@trading-bot"
          git add memory/TRADE-LOG.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "EOD snapshot $DATE

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
          git push
