name: Daily Summary

"on":
  schedule:
    # 4:00 AM Shanghai (GMT+8) = 8:00 PM UTC, Mon-Fri (runs after US market close)
    - cron: '0 20 * * 0-4'
  workflow_dispatch:

jobs:
  eod:
    runs-on: ubuntu-latest
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Skip if US market holiday
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          HOLIDAYS="2026-01-01 2026-01-19 2026-02-16 2026-04-03 2026-05-25 2026-06-19 2026-07-03 2026-09-07 2026-11-26 2026-12-25"
          if echo "$HOLIDAYS" | grep -qw "$TODAY"; then
            echo "US market holiday ($TODAY) — skipping"
            exit 1
          fi

      - name: Fetch Alpaca data
        run: |
          curl -s -H "APCA-API-KEY-ID: $ALPACA_API_KEY" -H "APCA-API-SECRET-KEY: $ALPACA_SECRET_KEY" https://paper-api.alpaca.markets/v2/account > /tmp/account.json
          curl -s -H "APCA-API-KEY-ID: $ALPACA_API_KEY" -H "APCA-API-SECRET-KEY: $ALPACA_SECRET_KEY" https://paper-api.alpaca.markets/v2/positions > /tmp/positions.json
          curl -s -H "APCA-API-KEY-ID: $ALPACA_API_KEY" -H "APCA-API-SECRET-KEY: $ALPACA_SECRET_KEY" "https://paper-api.alpaca.markets/v2/orders?status=open" > /tmp/orders.json
          echo "Account:" && python3 -c "import json; d=json.load(open('/tmp/account.json')); print(f'Equity: {d[\"equity\"]}, Cash: {d[\"cash\"]}')"
          echo "Positions:" && python3 -c "import sys,json; [print(f'{p[\"symbol\"]}: {p[\"qty\"]}sh, P&L {p[\"unrealized_pl\"]}') for p in json.load(open('/tmp/positions.json'))]"

      - name: Build prompt and call LLM
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPEN_ROUTER: ${{ secrets.OPEN_ROUTER }}
        run: |
          python3 scripts/build_eod_prompt.py
          cd scripts && python3 -c "
          import json, sys
          sys.path.insert(0, '.')
          from llm_router import call_llm
          prompt = json.load(open('/tmp/prompt.json'))
          system_msg = prompt['messages'][0]['content']
          user_msg = prompt['messages'][1]['content']
          response, provider, model = call_llm(system_msg, user_msg, prompt.get('max_tokens', 1500), prompt.get('temperature', 0.2))
          print(f'LLM OK — {provider}/{model}')
          json.dump({'choices': [{'message': {'content': response}}]}, open('/tmp/groq_response.json', 'w'))
          "
          python3 scripts/parse_groq_response.py

      - name: Update TRADE-LOG
        run: |
          echo "" >> memory/TRADE-LOG.md
          cat /tmp/trade_log_entry.md >> memory/TRADE-LOG.md
          echo "" >> memory/TRADE-LOG.md

      - name: Update TRADE-LOG summary
        run: python3 scripts/update_trade_log_summary.py

      - name: Broker-sourced P&L reconciliation
        run: python3 scripts/broker_pnl.py

      - name: Snapshot portfolio
        run: python3 scripts/snapshot_portfolio.py

      - name: Send Telegram
        run: |
          python3 -c "
          import json, urllib.request
          msg = open('/tmp/telegram_msg.txt').read()
          data = json.dumps({'chat_id': '${{ secrets.TELEGRAM_CHAT_ID }}', 'text': msg}).encode()
          req = urllib.request.Request('https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage', data=data, headers={'Content-Type': 'application/json'})
          resp = urllib.request.urlopen(req)
          print(f'Telegram: {resp.status}')
          "

      - name: Commit and push
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@trading-bot"
          git add memory/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "EOD snapshot $(date -u +%Y-%m-%d)"
          git push
