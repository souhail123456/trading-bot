name: Daily Summary

"on":
  schedule:
    - cron: '0 20 * * 0-4'
  workflow_dispatch:

jobs:
  eod:
    runs-on: ubuntu-latest
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Alpaca data
        run: |
          curl -s -H "APCA-API-KEY-ID: $ALPACA_API_KEY" -H "APCA-API-SECRET-KEY: $ALPACA_SECRET_KEY" https://paper-api.alpaca.markets/v2/account > /tmp/account.json
          curl -s -H "APCA-API-KEY-ID: $ALPACA_API_KEY" -H "APCA-API-SECRET-KEY: $ALPACA_SECRET_KEY" https://paper-api.alpaca.markets/v2/positions > /tmp/positions.json
          curl -s -H "APCA-API-KEY-ID: $ALPACA_API_KEY" -H "APCA-API-SECRET-KEY: $ALPACA_SECRET_KEY" "https://paper-api.alpaca.markets/v2/orders?status=open" > /tmp/orders.json
          echo "Account:" && python3 -c "import json; d=json.load(open('/tmp/account.json')); print(f'Equity: {d[\"equity\"]}, Cash: {d[\"cash\"]}')"
          echo "Positions:" && python3 -c "import sys,json; [print(f'{p[\"symbol\"]}: {p[\"qty\"]}sh, P&L {p[\"unrealized_pl\"]}') for p in json.load(open('/tmp/positions.json'))]"

      - name: Build prompt and call Groq
        run: |
          python3 scripts/build_eod_prompt.py
          HTTP_CODE=$(curl -s -o /tmp/groq_response.json -w "%{http_code}" -X POST "https://api.groq.com/openai/v1/chat/completions" -H "Authorization: Bearer $GROQ_API_KEY" -H "Content-Type: application/json" -d @/tmp/prompt.json)
          echo "Groq HTTP: $HTTP_CODE"
          test "$HTTP_CODE" = "200" || { cat /tmp/groq_response.json; exit 1; }
          python3 scripts/parse_groq_response.py

      - name: Update TRADE-LOG
        run: |
          echo "" >> memory/TRADE-LOG.md
          cat /tmp/trade_log_entry.md >> memory/TRADE-LOG.md
          echo "" >> memory/TRADE-LOG.md

      - name: Send Telegram
        run: |
          python3 -c "
          import json, urllib.request
          msg = open('/tmp/telegram_msg.txt').read()
          data = json.dumps({'chat_id': '${{ secrets.TELEGRAM_CHAT_ID }}', 'text': msg}).encode()
          req = urllib.request.Request('https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage', data=data, headers={'Content-Type': 'application/json'})
          resp = urllib.request.urlopen(req)
          print(f'Telegram: {resp.status}')
          "

      - name: Commit and push
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@trading-bot"
          git add memory/TRADE-LOG.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "EOD snapshot $(date -u +%Y-%m-%d)"
          git push
