name: Pre-market Research

"on":
  schedule:
    # 7:00 PM GMT+8 = 11:00 AM UTC, Mon-Fri
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Alpaca data
        run: |
          curl -s -H "APCA-API-KEY-ID: $ALPACA_API_KEY" -H "APCA-API-SECRET-KEY: $ALPACA_SECRET_KEY" https://paper-api.alpaca.markets/v2/account > /tmp/account.json
          curl -s -H "APCA-API-KEY-ID: $ALPACA_API_KEY" -H "APCA-API-SECRET-KEY: $ALPACA_SECRET_KEY" https://paper-api.alpaca.markets/v2/positions > /tmp/positions.json
          curl -s -H "APCA-API-KEY-ID: $ALPACA_API_KEY" -H "APCA-API-SECRET-KEY: $ALPACA_SECRET_KEY" "https://paper-api.alpaca.markets/v2/orders?status=open" > /tmp/orders.json

      - name: Fetch market context via Groq
        run: |
          DATE=$(date -u +%Y-%m-%d)
          python3 -c "
          import json
          payload = {
              'model': 'llama-3.3-70b-versatile',
              'messages': [{'role': 'user', 'content': 'Give me a concise market briefing for $DATE: S&P 500 futures, Nasdaq futures, VIX, WTI oil price, Brent oil, major earnings before open today, key economic data releases, and top 3 sector movers. Plain text, no markdown.'}],
              'max_tokens': 800,
              'temperature': 0.3
          }
          with open('/tmp/market_query.json', 'w') as f:
              json.dump(payload, f)
          "
          sed -i "s/\$DATE/$DATE/g" /tmp/market_query.json
          HTTP=$(curl -s -o /tmp/market_resp.json -w "%{http_code}" -X POST "https://api.groq.com/openai/v1/chat/completions" -H "Authorization: Bearer $GROQ_API_KEY" -H "Content-Type: application/json" -d @/tmp/market_query.json)
          if [ "$HTTP" = "200" ]; then
            python3 -c "import json; print(json.load(open('/tmp/market_resp.json'))['choices'][0]['message']['content'])" > /tmp/market_context.txt
          else
            echo "Market context unavailable" > /tmp/market_context.txt
          fi
          cat /tmp/market_context.txt

      - name: Build prompt and call Groq
        run: |
          python3 scripts/build_premarket_prompt.py
          HTTP=$(curl -s -o /tmp/groq_response.json -w "%{http_code}" -X POST "https://api.groq.com/openai/v1/chat/completions" -H "Authorization: Bearer $GROQ_API_KEY" -H "Content-Type: application/json" -d @/tmp/prompt.json)
          echo "Groq HTTP: $HTTP"
          test "$HTTP" = "200" || { cat /tmp/groq_response.json; exit 1; }
          python3 scripts/parse_groq_response.py

      - name: Update RESEARCH-LOG
        run: |
          echo "" >> memory/RESEARCH-LOG.md
          cat /tmp/trade_log_entry.md >> memory/RESEARCH-LOG.md
          echo "" >> memory/RESEARCH-LOG.md

      - name: Send Telegram
        run: |
          MSG=$(cat /tmp/telegram_msg.txt)
          test -z "$MSG" && echo "No telegram to send" && exit 0
          python3 -c "
          import json, urllib.request
          msg = open('/tmp/telegram_msg.txt').read()
          data = json.dumps({'chat_id': '${{ secrets.TELEGRAM_CHAT_ID }}', 'text': msg}).encode()
          req = urllib.request.Request('https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage', data=data, headers={'Content-Type': 'application/json'})
          urllib.request.urlopen(req)
          print('Telegram sent')
          "

      - name: Commit and push
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@trading-bot"
          git add memory/RESEARCH-LOG.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Pre-market research $(date -u +%Y-%m-%d)"
          git push
