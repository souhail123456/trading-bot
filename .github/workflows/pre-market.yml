name: Pre-market Research

"on":
  schedule:
    # 7:00 PM GMT+8 = 11:00 AM UTC, Mon-Fri
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Alpaca data
        run: |
          curl -s -H "APCA-API-KEY-ID: $ALPACA_API_KEY" -H "APCA-API-SECRET-KEY: $ALPACA_SECRET_KEY" https://paper-api.alpaca.markets/v2/account > /tmp/account.json
          curl -s -H "APCA-API-KEY-ID: $ALPACA_API_KEY" -H "APCA-API-SECRET-KEY: $ALPACA_SECRET_KEY" https://paper-api.alpaca.markets/v2/positions > /tmp/positions.json
          curl -s -H "APCA-API-KEY-ID: $ALPACA_API_KEY" -H "APCA-API-SECRET-KEY: $ALPACA_SECRET_KEY" "https://paper-api.alpaca.markets/v2/orders?status=open" > /tmp/orders.json

      - name: Fetch real market data
        run: python3 scripts/fetch_market_data.py

      - name: Build prompt and call Groq
        run: |
          python3 scripts/build_premarket_prompt.py
          bash scripts/call_groq.sh /tmp/prompt.json /tmp/groq_response.json
          python3 scripts/parse_groq_response.py

      - name: Update RESEARCH-LOG
        run: |
          echo "" >> memory/RESEARCH-LOG.md
          cat /tmp/trade_log_entry.md >> memory/RESEARCH-LOG.md
          echo "" >> memory/RESEARCH-LOG.md

      - name: Send Telegram
        run: |
          MSG=$(cat /tmp/telegram_msg.txt)
          test -z "$MSG" && echo "No telegram to send" && exit 0
          python3 -c "
          import json, urllib.request
          msg = open('/tmp/telegram_msg.txt').read()
          data = json.dumps({'chat_id': '${{ secrets.TELEGRAM_CHAT_ID }}', 'text': msg}).encode()
          req = urllib.request.Request('https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage', data=data, headers={'Content-Type': 'application/json'})
          urllib.request.urlopen(req)
          print('Telegram sent')
          "

      - name: Commit and push
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@trading-bot"
          git add memory/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Pre-market research $(date -u +%Y-%m-%d)"
          git push
